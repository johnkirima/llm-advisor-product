name: Build and deploy Node.js app to Azure Web App - llmadvisor

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: azure-deploy-llmadvisor
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: llm-advisor/nextjs_space

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: yarn
          cache-dependency-path: llm-advisor/nextjs_space/yarn.lock

      - name: Set up Yarn Classic (1.22.22)
        run: npm install -g yarn@1.22.22

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Generate Prisma Client
        run: yarn prisma generate

      - name: Build Next.js app
        run: yarn build

      - name: Upload artifact for deployment
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: llm-advisor/nextjs_space

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: ./node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_87C9BAEC0AC14D10B05C13C134B28D9D }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_B97837165BDC4486B306E6C455C20705 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_6119D05B32B743CFB5DAF519F3567469 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: llmadvisor
          slot-name: Production
          package: ./node-app
